<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vessel Overview</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- AG Grid -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
      color: #222;
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .topbar a {
      text-decoration: none;
      border: 1px solid #ccc;
      padding: 8px 10px;
      border-radius: 6px;
      color: black;
      background: #fff;
    }

    .topbar a:hover {
      background: #f1f1f1;
    }

    h1 {
      margin-bottom: 18px;
    }

    .status {
      margin: 8px 0 14px 0;
      font-size: 14px;
      color: #444;
    }

    .table-card {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      width: 100%;
      box-sizing: border-box;
    }

    #vesselOverviewGrid {
      width: 100%;
      height: 70vh;
      min-height: 500px;
    }

    .days-green {
      background-color: #c6efce;
      color: #006100;
      font-weight: 600;
      text-align: center;
    }

    .days-yellow {
      background-color: #ffeb9c;
      color: #9c6500;
      font-weight: 600;
      text-align: center;
    }

    .days-red {
      background-color: #ffc7ce;
      color: #9c0006;
      font-weight: 600;
      text-align: center;
    }

    .days-empty {
      background-color: #f2f2f2;
      color: #777;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/">Dashboard</a>
    <a href="/feedback-report-generator">Feedback report generator</a>
    <a href="/register-feedback">Register feedback</a>
    <a href="/vessel-data">Vessel Data</a>
  </div>

  <h1>Vessel Overview</h1>

  <div class="status" id="statusText">Loading data...</div>

  <div class="table-card">
    <div id="vesselOverviewGrid" class="ag-theme-alpine"></div>
  </div>

  <script>
    let gridApi = null;

    const STRICT_COLUMNS = new Set([
      "latest_feedback_date_days",
      "latest_feedback_received_at_days",
      "latest_report_generated_at_days"
    ]);

    const WIDE_COLUMNS = new Set([
      "latest_scavenge_date_days",
      "latest_scrape_lab_date_days",
      "latest_me_sys_date_days"
    ]);

    function isNullish(v) {
      return v === null || v === undefined || v === "";
    }

    function getDaysClass(columnName, value) {
      if (isNullish(value)) return "days-empty";

      const n = Number(value);
      if (Number.isNaN(n)) return "days-empty";

      if (STRICT_COLUMNS.has(columnName)) {
        if (n <= 20) return "days-green";
        if (n <= 30) return "days-yellow";
        return "days-red";
      }

      if (WIDE_COLUMNS.has(columnName)) {
        if (n <= 70) return "days-green";
        if (n <= 90) return "days-yellow";
        return "days-red";
      }

      return "";
    }

    function daysCellRenderer(params) {
      if (isNullish(params.value)) return "-";
      return params.value;
    }

    function daysCellClass(params) {
      return getDaysClass(params.colDef.field, params.value);
    }

    function formatValue(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "object") {
        try {
          return JSON.stringify(value);
        } catch (_) {
          return String(value);
        }
      }
      return value;
    }

    const gridOptions = {
      theme: "legacy",
      defaultColDef: {
        sortable: true,
        filter: true,
        resizable: true,
        minWidth: 140
      },
      animateRows: true,
      pagination: true,
      paginationPageSize: 25,
      paginationPageSizeSelector: [10, 25, 50, 100]
    };

    document.addEventListener('DOMContentLoaded', () => {
      const gridDiv = document.getElementById('vesselOverviewGrid');
      gridApi = agGrid.createGrid(gridDiv, gridOptions);
    });

    function buildColumnDefs(columns) {
      return columns.map(col => {
        const isDaysColumn = STRICT_COLUMNS.has(col.data) || WIDE_COLUMNS.has(col.data);

        if (isDaysColumn) {
          return {
            field: col.data,
            headerName: col.title,
            sortable: true,
            filter: 'agNumberColumnFilter',
            resizable: true,
            minWidth: 140,
            cellRenderer: daysCellRenderer,
            cellClass: daysCellClass
          };
        }

        return {
          field: col.data,
          headerName: col.title,
          sortable: true,
          filter: true,
          resizable: true,
          minWidth: 140
        };
      });
    }

    function buildRows(rows, columns) {
      return (rows || []).map(row => {
        const out = {};
        columns.forEach(col => {
          out[col.data] = formatValue(row[col.data]);
        });
        return out;
      });
    }

    function rebuildGrid(columns, rows) {
      if (!gridApi) {
        console.error("AG Grid API not ready yet.");
        return;
      }

      const columnDefs = buildColumnDefs(columns);
      const rowData = buildRows(rows, columns);

      gridApi.setGridOption("columnDefs", columnDefs);
      gridApi.setGridOption("rowData", rowData);
    }

    async function loadOverviewData() {
      const status = document.getElementById("statusText");
      status.textContent = "Loading data...";

      const res = await fetch("/api/vessel-overview/data");

      if (!res.ok) {
        status.textContent = "Failed to load data.";
        throw new Error("Failed to load vessel overview data");
      }

      const result = await res.json();
      rebuildGrid(result.columns || [], result.rows || []);

      status.textContent = `${(result.rows || []).length} vessel row(s) loaded.`;
    }

    loadOverviewData().catch(err => {
      console.error(err);
      document.getElementById("statusText").textContent = "Error loading vessel overview.";
    });
  </script>
</body>
</html>
