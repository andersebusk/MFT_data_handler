<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vessel Data</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Select2 -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <!-- AG Grid -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
      color: #222;
    }

    .topbar {
      display:flex;
      justify-content:flex-start;
      align-items:center;
      gap:12px;
      margin-bottom: 14px;
      flex-wrap:wrap;
    }

    .topbar a {
      text-decoration:none;
      border:1px solid #ccc;
      padding:8px 10px;
      border-radius:6px;
      color:black;
      background: #fff;
    }

    .topbar a:hover {
      background:#f6f6f6;
    }

    h1 {
      margin-bottom: 18px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 420px;
      flex: 1 1 420px;
    }

    label {
      font-weight: 600;
    }

    button {
      padding: 10px 16px;
      background-color: #A9D18E;
      color: black;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button.secondary {
      background:#eee;
      border:1px solid #ccc;
    }

    .status {
      margin: 8px 0 14px 0;
      font-size: 14px;
      color: #444;
    }

    .table-card {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      width: 100%;
      box-sizing: border-box;
    }

    .helptext {
      font-size: 0.9rem;
      color: #555;
      margin-top: 4px;
    }

    #vesselDataGrid {
      width: 100%;
      height: 70vh;
      min-height: 500px;
    }

    .select2-container {
      width: 100% !important;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/">Dashboard</a>
    <a href="/feedback-report-generator">Feedback report generator</a>
    <a href="/register-feedback">Register feedback</a>
    <a href="/vessel-overview">Vessel Data</a>
  </div>

  <h1>Vessel Data</h1>

  <div class="toolbar">
    <div class="field">
      <label for="vesselSelect">Choose one or more vessels</label>
      <select id="vesselSelect" multiple></select>
      <div class="helptext">
        Search by vessel name, select multiple vessels, and change the selection before or after loading.
      </div>
    </div>

    <div>
      <button id="loadBtn" type="button">Load Data</button>
    </div>

    <div>
      <button id="selectAllBtn" type="button" class="secondary">Select All</button>
    </div>

    <div>
      <button id="clearBtn" type="button" class="secondary">Clear Selection</button>
    </div>
  </div>

  <div class="status" id="statusText">Loading vessels...</div>

  <div class="table-card">
    <div id="vesselDataGrid" class="ag-theme-alpine"></div>
  </div>

  <script>
    let gridApi = null;
    let latestColumns = [];
    let latestHeaderLabels = {};

    const gridOptions = {
      theme: "legacy",
      defaultColDef: {
        sortable: true,
        filter: true,
        resizable: true,
        minWidth: 140
      },
      animateRows: true,
      pagination: true,
      paginationPageSize: 25,
      paginationPageSizeSelector: [10, 25, 50, 100]
    };

    document.addEventListener('DOMContentLoaded', () => {
      const gridDiv = document.getElementById('vesselDataGrid');
      gridApi = agGrid.createGrid(gridDiv, gridOptions);
    });

    async function loadVessels() {
      const res = await fetch("/api/vessel-data/vessels");
      if (!res.ok) throw new Error("Failed to load vessel list");

      const vessels = await res.json();
      const sel = $("#vesselSelect");
      sel.empty();

      vessels.forEach(vessel => {
        const option = new Option(vessel, vessel, false, false);
        sel.append(option);
      });

      $("#vesselSelect").select2({
        placeholder: "Search and select vessel(s)",
        allowClear: true,
        width: "100%",
        closeOnSelect: false
      });

      document.getElementById("statusText").textContent =
        "Choose one or more vessels and click Load Data. Use column menu for sort/filter.";
    }

    function getSelectedVessels() {
      return $("#vesselSelect").val() || [];
    }

    function formatValue(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "object") {
        try {
          return JSON.stringify(value);
        } catch (_) {
          return String(value);
        }
      }
      return value;
    }

    function buildColumnDefs(columns, headerLabels) {
      return columns.map(col => ({
        field: col,
        headerName: headerLabels[col] || col,
        sortable: true,
        filter: true,
        resizable: true,
        minWidth: 140
      }));
    }

    function buildRows(columns, rows) {
      return (rows || []).map(row => {
        const out = {};
        columns.forEach(col => {
          out[col] = formatValue(row[col]);
        });
        return out;
      });
    }

    function rebuildGrid(columns, rows, headerLabels) {
      if (!gridApi) {
        console.error("AG Grid API not ready yet.");
        return;
      }

      const columnDefs = buildColumnDefs(columns, headerLabels);
      const rowData = buildRows(columns, rows);

      gridApi.setGridOption("columnDefs", columnDefs);
      gridApi.setGridOption("rowData", rowData);
    }

    async function loadTableData() {
      const vessels = getSelectedVessels();
      document.getElementById("statusText").textContent = "Loading data...";

      const res = await fetch("/api/vessel-data/data", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ vessels })
      });

      if (!res.ok) {
        document.getElementById("statusText").textContent = "Failed to load data.";
        throw new Error("Failed to load vessel data");
      }

      const result = await res.json();

      latestColumns = result.columns || [];
      latestHeaderLabels = result.header_labels || {};

      rebuildGrid(latestColumns, result.rows || [], latestHeaderLabels);

      document.getElementById("statusText").textContent =
        `${(result.rows || []).length} row(s) loaded.`;
    }

    document.getElementById("loadBtn").addEventListener("click", loadTableData);

    document.getElementById("selectAllBtn").addEventListener("click", () => {
      const values = [];
      $("#vesselSelect option").each(function() {
        values.push($(this).val());
      });
      $("#vesselSelect").val(values).trigger("change");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      $("#vesselSelect").val(null).trigger("change");
    });

    loadVessels().catch(err => {
      console.error(err);
      document.getElementById("statusText").textContent = "Error loading vessels.";
    });
  </script>
</body>
</html>
